<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF1EC"/>
      <stop offset="1" stop-color="#F5EEDD"/>
    </linearGradient>
    <radialGradient id="sun" cx="78%" cy="22%" r="30%">
      <stop offset="0" stop-color="#F2D58A"/>
      <stop offset="1" stop-color="#F2D58A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="600" fill="url(#sky)"/>
  <rect width="900" height="600" fill="url(#sun)"/>
  <!-- distant tower/ruin -->
  <g fill="#24583F" opacity=".85">
    <rect x="700" y="250" width="26" height="180"/>
    <path d="M688 250 L726 210 L764 250 Z"/>
  </g>
  <!-- rolling hills -->
  <path d="M0 430 Q220 360 430 420 T900 410 V600 H0 Z" fill="#3C8A63"/>
  <path d="M0 480 Q260 420 520 470 T900 460 V600 H0 Z" fill="#2E6B4F"/>
  <path d="M0 540 Q300 500 600 535 T900 520 V600 H0 Z" fill="#24583F"/>
  <!-- birds -->
  <g stroke="#24583F" stroke-width="3" fill="none" opacity=".7">
    <path d="M150 150 q12 -10 24 0 q12 -10 24 0"/>
    <path d="M230 120 q9 -8 18 0 q9 -8 18 0"/>
  </g>
  <!-- floating island hint -->
  <g fill="#2E6B4F" opacity=".5">
    <path d="M120 220 q34 -26 74 -4 q-4 32 -40 40 q-44 -10 -34 -36z"/>
  </g>
  <text x="40" y="560" fill="#FAF8F3" font-size="20" font-weight="800" opacity=".92">一片等你探索的开放世界</text>
</svg>
